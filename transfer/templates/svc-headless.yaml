apiVersion: v1
kind: Service
metadata:
  name: {{ include "transfer.fullname" . }}-headless
  labels:
    {{- include "transfer.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: {{ .Values.service.port }}
    targetPort: http
  selector:
    {{- include "transfer.selectorLabels" . | nindent 4 }}