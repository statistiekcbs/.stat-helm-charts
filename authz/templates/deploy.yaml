apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "authz.fullname" . }}
  labels:
    {{- include "authz.labels" . | nindent 4 }}
spec:
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      {{- include "authz.selectorLabels" . | nindent 6 }}
  replicas: {{ .Values.replicaCount }}
  template:
    metadata:
    {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels: {}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: authz
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: authz
          env:
          #TODO: port as value
            - name: ASPNETCORE_URLS
              value: http://+:8080          
            - name: DBSERVER_COMMON
              value: {{ .Values.dbupcommon.dbserver_common }}
            - name: DB_COMMON
              value: {{ .Values.dbupcommon.db_common }}
            - name: USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.commondbRwUser }}
                  key: username
            - name: USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.commondbRwUser }}
                  key: password
            - name: "DotStatSuiteCoreCommonDbConnectionString"
              value: "Server=$(DBSERVER_COMMON);Database=$(DB_COMMON);User=$(USER);Password=$(USER_PASSWORD);"
            - name: "AutoLog2Google"
              value: "false"
          command: [ "/bin/sh" ]
          args: [ "-c", "dotnet DotStatServices.AuthorizationManagement.dll" ]
          ports:
            - name: http
            #TODO port
              containerPort: 8080
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - mountPath: /etc/ssl/certs/{{ .Values.certName }}.pem
              name: {{ .Values.certName }}
              subPath: ca.crt
            - mountPath: /tmp
              name: tmp
      volumes:
        - name: {{ .Values.certName }}
          configMap:
            name: {{ .Values.certName }}
        - name: tmp
          emptyDir:
            medium: Memory        
