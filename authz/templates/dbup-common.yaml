apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "authz.fullname" . }}-dbup-common
  {{- with .Values.dbupcommon.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  backoffLimit: 0
  template:
    spec:
      securityContext:
        {{- toYaml .Values.dbupcommon.podSecurityContext | nindent 8 }}
      containers:
        - image: {{ .Values.dbupcommon.image.repository }}:{{ .Values.dbupcommon.image.tag }}
          name: dbup-common 
          command:
            - dotnet
            - DotStat.DbUp.dll
            - upgrade
          args:
            - --force
            - --commonDb
            - --connectionString 
            {{- $addParams := join ";" (append .Values.dbupcommon.additionalParams "") }}
            {{- $addUserParams := join ";" .Values.dbupcommon.userSecrets.admin.additionalParams }}
            - Server={{ .Values.dbupcommon.serverHostname }},{{ .Values.dbupcommon.serverPort }};Database={{ .Values.dbupcommon.dbName }};User=$(ADMIN_USER);Password=$(ADMIN_PASSWORD);{{ $addParams }}{{ $addUserParams }}
            - --loginName
            - $(WRITER_USER)
            - --loginPwd
            - $(WRITER_PASSWORD)
            {{- if .Values.dbupcommon.userSecrets.reader }}
            - --ROloginName
            - $(READ_ONLY_USER)
            - --ROloginPwd
            - $(READ_ONLY_PASSWORD)
            {{- end }}
            {{- if and .Values.dbInit.data.alterPasswords .Values.dbInit.data.executeDbaScripts }}
            - --alterPassword
            {{- end }}
            {{- if not .Values.dbInit.data.executeDbaScripts }}
            - --withoutDbaScripts
            {{- end }}
            {{- with .Values.dbInit.data.timezone }}
            - --timezone
            - '{{ . }}'
            {{- end }}
            {{- if and .Values.dbInit.data.dropDb .Values.dbInit.data.executeDbaScripts }}
            - --dropDb
            {{- end }}
            - --executionTimeout
            - '{{ .Values.dbInit.data.executionTimeout }}'
            {{- with .Values.dbInit.data.googleLogging }}
            - --googleProjectId
            - '{{ .projectId }}'
            - --googleLogId
            - '{{ .logId }}'
            {{- end }}
          env:
            {{- with .Values.dbupcommon.userSecrets.admin }}
            - name: ADMIN_USER
              valueFrom:
                secretKeyRef:
                  key: {{ .username.key }}
                  name: {{ include "authz.dbSecretName" . | default (include "authz.dbGeneratedSecretName" (dict "root" $ "type" "data" "key" "admin" ) ) }}
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: {{ .password.key }}
                  name: {{ include "authz.dbSecretName" . | default (include "authz.dbGeneratedSecretName" (dict "root" $ "type" "data" "key" "admin" ) ) }}
            {{- end }}
            {{- with .Values.dbupcommon.userSecrets.writer }}
            - name: WRITER_USER
              valueFrom:
                secretKeyRef:
                  key: {{ .username.key }}
                  name: {{ include "authz.dbSecretName" . | default (include "authz.dbGeneratedSecretName" (dict "root" $ "type" "data" "key" "writer" ) ) }}
            - name: WRITER_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: {{ .password.key }}
                  name: {{ include "authz.dbSecretName" . | default (include "authz.dbGeneratedSecretName" (dict "root" $ "type" "data" "key" "writer" ) ) }}
            {{- end }}
            {{- with .Values.dbupcommon.userSecrets.reader }}
            - name: READ_ONLY_USER
              valueFrom:
                secretKeyRef:
                  key: {{ .username.key }}
                  name: {{ include "authz.dbSecretName" . | default (include "authz.dbGeneratedSecretName" (dict "root" $ "type" "data" "key" "reader" ) ) }}
            - name: READ_ONLY_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: {{ .password.key }}
                  name: {{ include "authz.dbSecretName" . | default (include "authz.dbGeneratedSecretName" (dict "root" $ "type" "data" "key" "reader" ) ) }}
            {{- end }}
          {{- with .Values.dbupcommon.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.dbupcommon.securityContext | nindent 12 }}
          volumeMounts:
            - mountPath: /tmp
              name: tmp
          {{- with .Values.dbInit.data.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      restartPolicy: Never
      volumes:
        - name: tmp
          emptyDir: {}      
        {{- with .Values.volumes }}
          {{- toYaml . | nindent 10 }}
        {{- end }}
