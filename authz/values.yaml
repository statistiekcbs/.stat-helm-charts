database:
  # -- Server URL
  serverHostname: ""
  serverPort: 1433
  # -- Database name
  dbName: ""

  additionalParams: []

dbInit:
  common:
    # -- Enable structure database init job
    enabled: false

    # -- Roll deployment on job change
    rollDeployment: false

    podSecurityContext: {}

    annotations:
      {}
      # argocd.argoproj.io/hook: PreSync
      # argocd.argoproj.io/hook-delete-policy: BeforeHookCreation

    image:
      repository: siscc/dotstatsuite-dbup
      pullPolicy: IfNotPresent
      # -- Overrides the image tag whose default is the chart appVersion.
      tag: "v31.0.0"

    # -- The DBA scripts are not executed: it will not create logins / users, won't
    # put the DB in restricted mode while running
    executeDbaScripts: true
    # -- Drops the database before creating it
    dropDb: false
    # -- Changes the passwords of existing loginName and ROloginName logins in
    # database
    alterPasswords: false
    # -- Optional. When provided, uses the given value (name of the time zone)
    # instead of trying to determine it in the related sql script(s). Should be
    # used in cases when the stored procedure [MASTER].[dbo.xp_regread] cannot
    # be executed.
    timezone: ""
    # -- The execution timeout in minutes
    executionTimeout: 30

    googleLogging:
      {}
      # Google.Cloud logging projectId
      # projectId: ""
      # Google.Cloud logging logId
      # logId: DbUp

    securityContext:
      {}
      # readOnlyRootFilesystem: true
      # allowPrivilegeEscalation: false
      # privileged: false
      # capabilities:
      #   drop:
      #   - all
      # runAsGroup: 1654
      # runAsUser: 1654
      # runAsNonRoot: true

    resources:
      {}
      # requests:
      #   cpu: 100m
      #   memory: 50Mi
      # limits:
      #   cpu: 500m
      #   memory: 100Mi

    additionalParams: []

    volumeMounts: []

monitoring:
  # -- Enable monitoring by adding a dotnet monitoring side-car
  enabled: false

  # -- Monitoring is build for the dotnet-monitor container from Microsoft
  image:
    repository: mcr.microsoft.com/dotnet/monitor
    pullPolicy: IfNotPresent
    # -- Overrides the image tag whose default is the chart appVersion.
    tag: "8"

  # -- Port number to listen to for metrics requests
  port: 52325

  # -- The collectionInterval is the amount of seconds between 2 collection events
  collectionInterval: 5
  # -- The collectionCount is the amount of collections exposed at the metrics endpoint
  collectionCount: 3
  # -- The collection interval and count together form the metrics scrape interval:
  # scrapeInterval = collectionInterval*collectionCount

  # -- Additional metrics providers and counter names
  # https://github.com/dotnet/dotnet-monitor/blob/main/documentation/configuration/metrics-configuration.md#custom-metrics
  providers:
    - ProviderName: System.Runtime
    - ProviderName: Microsoft.AspNetCore.Hosting
    - ProviderName: Microsoft.AspNetCore.Http.Connections
    - ProviderName: Microsoft-AspNetCore-Server-Kestrel
    - ProviderName: System.Net.Http

  resources:
    {}
    # Recommende resource request and limits:
    # https://github.com/dotnet/dotnet-monitor/blob/main/documentation/kubernetes.md#recommended-container-limits
    # requests:
    #   memory: "32Mi"
    #   cpu: "50m"
    # limits:
    #   memory: "256Mi"
    #   cpu: "250m"

  # -- Make sure the user for the main container and the monitoring side car are
  # the same!
  securityContext:
    {}
    # allowPrivilegeEscalation: false
    # privileged: false
    # capabilities:
    #   drop:
    #   - all
    # runAsGroup: 1654
    # runAsUser: 1654
    # runAsNonRoot: true
    # readOnlyRootFilesystem: true

  volumeMounts:
    []
    # - name: foo
    #   mountPath: "/etc/foo"
    #   readOnly: true

  serviceMonitor:
    # -- Enables the deployment of a serviceMonitor resource
    enabled: false

  grafanaDashboard:
    #
    enabled: false

# Additional volumes on the output Deployment definition.
