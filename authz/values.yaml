# Default values for authz.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 2

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: siscc/dotstatsuite-core-auth-management
  # This sets the pull policy for images.
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v11.0.0"

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""
certName: cbsp-trusted-certs

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: 
  # since we log with OTEL - exclude the logs in fluentbit
  # TODO: Redo annotaions
  instrumentation.opentelemetry.io/otel-dotnet-auto-runtime: linux-musl-x64
  instrumentation.opentelemetry.io/inject-dotnet: opentelemetry-operator-tst/instrumentation
  fluentbit.io/exclude: "true"
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: 
  seccompProfile:
    type: RuntimeDefault

topologySpreadConstraints:
- maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: DoNotSchedule
  labelSelector:
    matchLabels: {}

# These contains the names of the externalSecrets, each in the form username/password
externalSecrets:
  annotaions: {}
  refreshInterval: 24h
  commondbOwner: 
    name: commondb-owner
    path: workload01/accounts/mssql/common/owner
  commondbRwUser: 
    name: commondb-rw-user
    path: workload01/accounts/mssql/common/rw
  commondbRoUser:
    name: commondb-ro-user
    path: workload01/accounts/mssql/common/ro
  vaultName: vault-backend-cbs-workloads

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  allowPrivilegeEscalation: false
  privileged: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - all

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  annotations: {}
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations:
    {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    []
    # - secretName: chart-example-tls
    #   hosts:
    #     - chart-example.local

env:
  autoLogToGoogle: false

auth:
  # -- Is openid authentication enabled
  enabled: true
  audience: openid
  authority: https://keycloak.user-np01.k8s.cbsp.nl/realms/kerberos
  authorizationUrl: https://keycloak.user-np01.k8s.cbsp.nl/realms/kerberos/protocol/openid-connect/auth
  clientId: DotStat-Cbs
  scopes:
  - openid
  - profile
  - email
  - groups
  claimsMapping:
    email: "email"
    groups: "groups"
  requireHttps: false
  validateIssuer: false
  allowAnonymous: true
  showPii: true

# -- Expose the service via gateway-api HTTPRoute
# Requires Gateway API resources and suitable controller installed within the cluster
# (see: https://gateway-api.sigs.k8s.io/guides/)
httpRoute:
  # -- enables the creation of an HTTPRoute
  enabled: false

  # -- Add annotations to the route
  annotations: {}

  # -- A least one parentRef is required
  parentRefs: []

  # -- Hostnames to match the route
  hostnames: []

  # -- Defines filters for the default backend
  serviceBackendFilters: []

  # -- Defines what the default service backend matches
  serviceBackendMatches:
    - path:
        type: PathPrefix
        value: /

  # -- Defines addional rules
  additionalRules: []

networkPolicies:
  # -- Enables the deployment of network policies
  # You can use YAML anchors to refer to other parts of the values file, like
  # the service port for example
  # https://helm.sh/docs/chart_template_guide/yaml_techniques/#yaml-anchors
  enabled: false

  # -- Enable ingress network policies
  enableIngress: true

  # -- The list selectors allowed to acces the pod on the http port
  httpSelectors:
    []
    # - namespaceSelector:
    #     matchLabels:
    #       kubernetes.io/metadata.name: namespace-name
    #   podSelector:
    #     matchLabels:
    #       label: value

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  requests:
    memory: 250Mi
    cpu: 5m
  limits:
    memory: 250Mi
    cpu: 100m

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15              
  successThreshold: 1
  failureThreshold: 15
  periodSeconds: 5
  timeoutSeconds: 3
           
readinessProbe:
  httpGet:
    path: /health
    port: http
  successThreshold: 1
  failureThreshold: 2
  periodSeconds: 10
  timeoutSeconds: 3

livenessProbe:
  httpGet:
    path: /live
    port: http
  successThreshold: 1
  failureThreshold: 3
  periodSeconds: 30
  timeoutSeconds: 3

#These are the values for the prometheus probe
probe:
  # -- Enables an HTTP probe
  enabled: false
  # -- Probe interval
  interval: "30s"
  # -- Label to get picked up by the monitoring stack
  # @default -- release: rancher-monitoring
  selectorLabel: ""
  # -- Additional labels to add to the probe and prometheus metric
  extraLabels: {}
  # -- Name of the module to use for probing
  module: "http_2xx"
  # -- URL of the prober (blackbox exporter)
  proberUrl: ""
  # -- Path used by the prober
  proberPath: "/probe"
  # -- Value of the "probe" label, defaults to the probe resource name
  probeLabel: ""
  # -- Metric relabeling
  relabelings: []
    # - sourceLabels: 
    #   targetLabel:
  # -- URLs to probe, usually the HTTPRoute or Ingress hostnames
  urls: []


probedb:
  # -- Enables an HTTP probe
  enabled: false
  # -- Probe interval
  interval: "30s"
  # -- Label to get picked up by the monitoring stack
  # @default -- release: rancher-monitoring
  selectorLabel: ""
  # -- Additional labels to add to the probe and prometheus metric
  extraLabels: {}
  # -- Name of the module to use for probing
  module: "tls_connect"
  # -- URL of the prober (blackbox exporter)
  proberUrl: ""
  # -- Path used by the prober
  proberPath: "/probe"
  # -- Value of the "probe" label, defaults to the probe resource name
  probeLabel: ""
  # -- Metric relabeling
  relabelings: []
    # - sourceLabels: 
    #   targetLabel:
  # -- URLs to probe, usually the HTTPRoute or Ingress hostnames
  urls: []

