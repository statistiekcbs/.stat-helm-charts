        repository: siscc/sdmxri-nsi-maapi
        pullPolicy: IfNotPresent
        # -- Overrides the image tag whose default is the chart appVersion.
        tag: ""

      command:
        # -- Override the default start comman of the maapi initContainer
        commandOverride: []
        # -- Specifies de DB connection alias to be use bij the maapi tool. Usually
        # should not be changed
        dbAlias: nsiws-struct-db
        # -- Specifies if the mapping store database should reset (true) or persist
        # (false) all the changes done to the artifacts, when the container is
        # restarted.
        resetStructureDb: false
        # -- Specifies the mapping store database version to be used, if not the latest
        # is required. Use this parameter only when you know what you are doing.
        dbVersion: "7.7"

      # -- Additional environment variables
      env: []

      securityContext:
        {}
        # readOnlyRootFilesystem: true
        # allowPrivilegeEscalation: false
        # privileged: false
        # capabilities:
        #   drop:
        #   - all
        # runAsGroup: 1654
        # runAsUser: 1654
