  reader: 
    # -- Secret name for username and password
    name: ""
    # -- Set to true to use an external
    # When using an external secret , the secret name is generated
    isExternal: false
    annotations: {}
    username:
      # -- The username secret key
      key: ""
      # -- When using an external secret, remoteRef.key is required
      # If remoteRef.property is not set, username.key is used
      remoteRef:
        key: ""
    password:
      # -- The password secret key
      key: ""
      # -- When using an external secret, remoteRef.key is required
      # If remoteRef.property is not set, password.key is used
