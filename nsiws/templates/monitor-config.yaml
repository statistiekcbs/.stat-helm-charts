{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nsiws.fullname" . }}-monitor
  labels:
    {{- include "nsiws.labels" . | nindent 4 }}
data:
  dotnet-monitor.json: |
    {
      "Metrics": {
        "Providers": {{ .Values.monitoring.providers | toPrettyJson | indent 8 | trim }}
      }
    }
{{- end }}