{{- if .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nsiws.fullname" . }}
  labels:
    {{- include "nsiws.labels" . | nindent 4 }}
spec:
  
  ingress:
    - ports:
        - protocol: TCP
          port: http
      {{- with .Values.networkPolicies.httpSelectors }}
      from:
        {{- . | toYaml | nindent 8 }}
      {{- end }}
    - ports:
        - protocol: TCP
          port: metrics
      {{- with .Values.networkPolicies.metricsSelectors }}
      from:
        {{- . | toYaml | nindent 8 }}
      {{- end }}
  {{- with .Values.networkPolicies.additionalIngressRules }}
    {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .Values.networkPolicies.egressRules }}
  egress:
    {{- . | toYaml | nindent 4 }}
  {{- end }}
  podSelector:
    matchLabels:
      {{- include "nsiws.selectorLabels" . | nindent 6 }}
  policyTypes:
    {{- if .Values.networkPolicies.enableIngress }}
    - Ingress
    {{- end }}
    {{- if .Values.networkPolicies.enableEgress }}
    - Egress
    {{- end }}
{{- end }}